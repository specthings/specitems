name: Manage PR comment
on:
  workflow_run:
    workflows:
    - Python package
    types:
    - completed
jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
    - name: Get associated PR number
      id: pr
      run: |
        pr=$(gh api \
          "/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
          --jq '.[0].number')
        echo "$pr" | grep -q '^[1-9][0-9]*$'
        echo "pr=$pr" >>$GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Delete comment
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        number: ${{ steps.pr.outputs.pr }}
        delete: true
    - name: Download artifacts
      if: ${{ github.event.workflow_run.conclusion == 'failure' }}
      uses: actions/download-artifact@v4
      with:
        name: comment-md
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}
        path: .
    - name: Post comment
      if: ${{ github.event.workflow_run.conclusion == 'failure' }}
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        number: ${{ steps.pr.outputs.pr }}
        path: comment.md
