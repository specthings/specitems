name: Manage PR comment
on:
  workflow_run:
    workflows:
    - Python package
    types:
    - completed
jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
    - name: Get associated PR number
      id: pr
      uses: actions/github-script@v7
      env:
        REPOSITORY: ${{ github.repository }}
        RUN_ID: ${{ github.event.workflow_run.id }}
      with:
        script: |
          const [owner, repo] = process.env.REPOSITORY.split('/');
          const run_id = process.env.RUN_ID;
          const prs = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/pull_requests', {
            owner,
            repo,
            run_id
          });
          if (prs.data.pull_requests && prs.data.pull_requests.length > 0) {
            const number = prs.data.pull_requests[0].number;
            core.info(`PR #${number} is associated with this workflow run`);
            core.setOutput('pr', number);
          } else {
            core.setFailed('No PR is associated with this workflow run');
          }
    - name: Delete comment
      if: ${{ github.event.workflow_run.conclusion == 'success' }}
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        number: ${{ steps.pr.outputs.pr }}
        delete: true
    - name: Download artifacts
      if: ${{ github.event.workflow_run.conclusion == 'failure' }}
      uses: actions/download-artifact@v4
      with:
        name: comment-md
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ github.token }}
        path: .
    - name: Post comment
      if: ${{ github.event.workflow_run.conclusion == 'failure' }}
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        number: ${{ steps.pr.outputs.pr }}
        path: comment.md
