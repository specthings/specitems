name: Python package
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        os:
        - macos-latest
        - ubuntu-latest
        include:
        - python-version: '3.14'
          os: ubuntu-latest
          upload-comment: true
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
        version: 0.10.12
    - name: Make
      id: make
      run: |
        make
        git add -N .
        {
           echo "After formatting, the following changes were pending:"
           echo '```diff'
           git diff
           echo '```'
        } >.github/status/comment.md
        status=$(test -z "$(git status --short)"; echo $?)
        echo "status=$status" >>$GITHUB_OUTPUT
        exit "$status"
    - name: Upload comment artifact
      if: ${{ always() && matrix.upload-comment && steps.make.outputs.status == '1' && github.event_name == 'pull_request' }}
      uses: actions/upload-artifact@v4
      with:
        name: comment-md
        path: .github/status/comment.md
