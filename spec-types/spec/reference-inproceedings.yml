- role: spec-member
  uid: root
- role: spec-refinement
  spec-key: reference-type
  spec-value: inproceedings
  uid: reference
spec-description: null
spec-example: null
spec-info:
  dict:
    attributes:
      author:
        description: |
          It shall be the author or the list of authors of the article.
        spec-type: str-or-list-str
      booktitle:
        description: |
          It shall be the title of the conference proceedings.
        spec-type: str
      doi:
        description: |
          It shall be the digital object identifier (DOI) of the article.
        spec-type: str
      editor:
        description: |
          It shall be the editor or the list of editors of the article.
        spec-type: str-or-list-str
      month:
        description: |
          It shall be the month of publication.
        spec-type: month
      note:
        description: |
          It shall be associated miscellaneous information.
        spec-type: str
      number:
        description: |
          It shall be the issue number of the conference proceedings.
        spec-type: str
      organization:
        description: |
          It shall be the associated organization.
        spec-type: str
      pages:
        description: |
          It shall be the page numbers, separated either by commas or
          double-hyphens.
        spec-type: str
      publisher:
        description: |
          It shall be the name of the publisher.
        spec-type: str
      series:
        description: |
          It shall be the series of the conference proceedings the article was
          published.
        spec-type: str
      volume:
        description: |
          It shall be the volume of the conference proceedings.
        spec-type: str
      year:
        description: |
          It shall be the year of publication.
        spec-type: str
    description: |
      This set of attributes specifies a reference to an article in a
      conference proceedings.
    mandatory-attributes:
    - author
    - booktitle
    - year
spec-name: In Conference Proceedings Reference
spec-type: reference-inproceedings
type: spec
