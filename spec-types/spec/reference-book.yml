spec-info:
  dict:
    attributes:
      author:
        description: |
          It shall be the author or the list of authors of the book.
        spec-type: str-or-list-str
      edition:
        description: |
          It shall be the edition of the book.
        spec-type: str
      editor:
        description: |
          It shall be the editor or the list of editors of the book.
        spec-type: str-or-list-str
      month:
        description: |
          It shall be the month of publication.
        spec-type: month
      note:
        description: |
          It shall be associated miscellaneous information.
        spec-type: str
      number:
        description: |
          It shall be the issue number of the book.
        spec-type: str
      publisher:
        description: |
          It shall be the name of the publisher.
        spec-type: str
      series:
        description: |
          It shall be the series of books the book was published.
        spec-type: str
      volume:
        description: |
          It shall be the volume of a multi-volume book.
        spec-type: str
      year:
        description: |
          It shall be the year of publication.
        spec-type: str
    description: |
      This set of attributes specifies a reference to a book.
    mandatory-attributes:
    - author
    - publisher
    - year
