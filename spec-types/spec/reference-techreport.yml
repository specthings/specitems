spec-description: null
spec-example: null
spec-info:
  dict:
    attributes:
      author:
        description: |
          It shall be the author or the list of authors of the technical report.
        spec-type: str-or-list-str
      institution:
        description: |
          It shall be the institution that was involved in the publishing.
        spec-type: str
      month:
        description: |
          It shall be the month of publication.
        spec-type: month
      note:
        description: |
          It shall be associated miscellaneous information.
        spec-type: str
      number:
        description: |
          It shall be the issue number of the technical report.
        spec-type: str
      publication-type:
        description: |
          If the attribute is present, it shall be the publication type
          overriding the default.
        spec-type: str
      year:
        description: |
          It shall be the year of publication.
        spec-type: str
    description: |
      This set of attributes specifies a reference to a technical report.
    mandatory-attributes:
    - author
    - institution
    - year
spec-name: Technical Report Reference
spec-type: reference-techreport
type: spec
